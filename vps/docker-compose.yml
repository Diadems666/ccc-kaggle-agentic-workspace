version: '3.8'

# Optional Docker services for the coding workspace.
# These are NOT required — the workspace can run without Docker.
# Use this if you want containerised services (e.g., a database for a project).

services:
  # PostgreSQL — for projects that need a local database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-workspace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  # Redis — for caching, sessions, queues
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
  redis_data:

# Usage:
#   docker compose up -d postgres redis
#   docker compose down
#
# Connection strings (add to your project .env):
#   DATABASE_URL=postgresql://workspace:changeme@localhost:5432/workspace
#   REDIS_URL=redis://:changeme@localhost:6379/0
